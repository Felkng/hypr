<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Definir RobotoMono Nerd Font como fonte preferida para Sans-Serif -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>sans-serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>RobotoMono Nerd Font</string>
    </edit>
  </match>

  <!-- Definir RobotoMono Nerd Font como fonte preferida para Monospace -->
  <match target="pattern">
    <test name="family" qual="any">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>RobotoMono Nerd Font</string>
    </edit>
  </match>

  <!-- Fallback global para ícones (Nerd Fonts) -->
  <match target="pattern">
    <edit name="family" mode="append" binding="strong">
      <string>RobotoMono Nerd Font</string>
    </edit>
  </match>

  <!-- Fallback global para Emojis -->
  <match target="pattern">
    <edit name="family" mode="append" binding="strong">
      <string>Noto Color Emoji</string>
    </edit>
  </match>
</fontconfig>
